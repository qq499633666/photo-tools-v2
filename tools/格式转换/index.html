<body>
    <div class="container">
        <a href="../../index.html" class="back-home">← 返回首页</a>
        <h1>🔄 图片格式转换工具</h1>
        <p class="subtitle">支持多种格式，轻松转换</p>

        <div class="features">
            <div class="feature"><div class="feature-icon">📊</div><div class="feature-text">高质量</div></div>
            <div class="feature"><div class="feature-icon">⚡</div><div class="feature-text">快速转换</div></div>
            <div class="feature"><div class="feature-icon">🛡️</div><div class="feature-text">安全可靠</div></div>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <p class="upload-text">点击上传图片或拖拽图片到这里</p>
            <p class="upload-hint">支持 JPG、PNG、WebP、GIF 格式</p>
            <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp,image/gif">
        </div>

        <div class="options" id="options">
            <div class="option-group">
                <label class="option-label">选择目标格式：</label>
                <div class="format-grid">
                    <button class="format-btn" data-format="jpeg">JPG</button>
                    <button class="format-btn active" data-format="png">PNG</button>
                    <button class="format-btn" data-format="webp">WebP</button>
                    <button class="format-btn" data-format="gif">GIF</button>
                </div>
            </div>
            <button class="btn" id="convertBtn">🔄 开始转换</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在转换中，请稍候...</p>
        </div>

        <div class="preview-container" id="previewContainer">
            <div class="preview-row">
                <div class="preview-box">
                    <h3>📷 原图</h3>
                    <canvas id="originalCanvas"></canvas>
                    <div class="format-badge" id="originalFormat">-</div>
                </div>
                <div class="preview-box">
                    <h3>✨ 转换后</h3>
                    <canvas id="resultCanvas"></canvas>
                    <div class="format-badge" id="resultFormat">-</div>
                </div>
            </div>
            <button class="btn" id="downloadBtn">💾 下载图片</button>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const options = document.getElementById('options');
        const loading = document.getElementById('loading');
        const previewContainer = document.getElementById('previewContainer');
        const originalCanvas = document.getElementById('originalCanvas');
        const resultCanvas = document.getElementById('resultCanvas');
        const convertBtn = document.getElementById('convertBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const formatBtns = document.querySelectorAll('.format-btn');
        const originalFormat = document.getElementById('originalFormat');
        const resultFormat = document.getElementById('resultFormat');

        let currentFile = null;
        let currentImage = null;
        let targetFormat = 'png';

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) handleFile(file);
        });
        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        formatBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                formatBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                targetFormat = btn.dataset.format;
            });
        });

        function handleFile(file) {
            currentFile = file;
            const ext = file.name.split('.').pop().toUpperCase();
            originalFormat.textContent = ext;
            
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    uploadArea.style.display = 'none';
                    options.classList.add('show');
                    
                    const maxSize = 500;
                    let width = img.width;
                    let height = img.height;
                    if (width > maxSize || height > maxSize) {
                        if (width > height) {
                            height = (height / width) * maxSize;
                            width = maxSize;
                        } else {
                            width = (width / height) * maxSize;
                            height = maxSize;
                        }
                    }
                    
                    originalCanvas.width = width;
                    originalCanvas.height = height;
                    const ctx = originalCanvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function convertImage() {
            if (!currentImage) return;
            loading.classList.add('show');
            previewContainer.classList.remove('show');

            setTimeout(() => {
                const mimeType = targetFormat === 'gif' ? 'image/gif' : 'image/' + targetFormat;
                resultFormat.textContent = targetFormat.toUpperCase();
                
                resultCanvas.width = originalCanvas.width;
                resultCanvas.height = originalCanvas.height;
                const ctx = resultCanvas.getContext('2d');
                ctx.drawImage(currentImage, 0, 0, originalCanvas.width, originalCanvas.height);
                
                loading.classList.remove('show');
                previewContainer.classList.add('show');
                downloadBtn.dataset.mimeType = mimeType;
                downloadBtn.dataset.filename = 'converted_' + Date.now() + '.' + targetFormat;
            }, 100);
        }

        convertBtn.addEventListener('click', convertImage);

        downloadBtn.addEventListener('click', () => {
            showPaywall(() => {
                const link = document.createElement('a');
                link.download = downloadBtn.dataset.filename;
                link.href = resultCanvas.toDataURL(downloadBtn.dataset.mimeType);
                link.click();
            });
        });
    </script>
    <script>
    let paywallCallback = null;
    let adTimer = null;

    function showPaywall(callback) {
        paywallCallback = callback;
        document.getElementById('paywall').classList.add('show');
        document.getElementById('qrSection').style.display = 'none';
        document.getElementById('adContainer').classList.remove('show');
        document.getElementById('watchAdBtn').style.display = 'block';
    }

    function closePaywall() {
        document.getElementById('paywall').classList.remove('show');
        if (adTimer) { clearInterval(adTimer); adTimer = null; }
    }

    function watchAd() {
        document.getElementById('adContainer').classList.add('show');
        document.getElementById('watchAdBtn').style.display = 'none';
        let seconds = 5;
        document.getElementById('adCountdown').textContent = seconds;
        adTimer = setInterval(() => {
            seconds--;
            document.getElementById('adCountdown').textContent = seconds;
            if (seconds <= 0) {
                clearInterval(adTimer);
                adTimer = null;
                closePaywall();
                if (paywallCallback) paywallCallback();
            }
        }, 1000);
    }

    function showQrCode() {
        document.getElementById('qrSection').style.display = 'block';
        document.getElementById('adContainer').classList.remove('show');
        document.getElementById('watchAdBtn').style.display = 'block';
    }
    </script>


    <div class="paywall" id="paywall">
        <span class="paywall-close" onclick="closePaywall()">×</span>
        <div class="paywall-box">
            <div class="paywall-title">🔒 解锁下载</div>
            <div class="paywall-desc">使用完整功能前，请先观看广告或支付1元</div>
            <div class="paywall-btns">
                <button class="paywall-btn btn-ad" id="watchAdBtn" onclick="watchAd()">
                    📺 观看广告（免费）
                </button>
                <button class="paywall-btn btn-pay" onclick="showQrCode()">
                    💰 支付1元
                </button>
            </div>
            <div class="ad-container" id="adContainer">
                <p style="color:#666;font-size:13px;margin-bottom:15px;">⏱️ 观看完广告即可解锁</p>
                <div style="background:#fff5f7;padding:20px;border-radius:10px;margin-bottom:15px;">
                    <p style="color:#f5576c;font-size:14px;">📺 广告播放中...</p>
                    <p style="color:#999;font-size:12px;margin-top:5px;">剩余 <span id="adCountdown">5</span> 秒</p>
                </div>
            </div>
            <div class="qr-section" id="qrSection" style="display:none;margin-top:20px;">
                <p style="color:#666;font-size:13px;margin-bottom:15px;">👆 扫码支付1元，支付完成后联系客服解锁</p>
                <div class="qr-wrapper">
                    <img src="../../payment-qr.jpg" alt="收款码">
                </div>
                <p style="color:#999;font-size:12px;margin-top:10px;">截图保存 → 微信/支付宝扫码支付</p>
            </div>
        </div>
    </div>

</body>
