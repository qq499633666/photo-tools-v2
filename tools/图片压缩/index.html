<body>
    <div class="container">
        <a href="../../index.html" class="back-home">← 返回首页</a>
        <h1>📦 图片压缩工具</h1>
        <p class="subtitle">高效压缩，保留清晰度，减少文件大小</p>

        <div class="features">
            <div class="feature"><div class="feature-icon">🚀</div><div class="feature-text">快速处理</div></div>
            <div class="feature"><div class="feature-icon">🔒</div><div class="feature-text">本地处理</div></div>
            <div class="feature"><div class="feature-icon">💾</div><div class="feature-text">免费下载</div></div>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <p class="upload-text">点击上传图片或拖拽图片到这里</p>
            <p class="upload-hint">支持 JPG、PNG、WebP 格式</p>
            <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
        </div>

        <div class="options" id="options">
            <div class="option-group">
                <label class="option-label">压缩质量：<span id="qualityLabel">80%</span></label>
                <div class="slider-row">
                    <input type="range" class="slider" id="qualitySlider" min="10" max="100" value="80">
                    <span class="slider-value" id="qualityValue">80%</span>
                </div>
            </div>
            <div class="option-group">
                <label class="option-label">输出格式：</label>
                <div class="format-select">
                    <button class="format-btn active" data-format="original">保持原格式</button>
                    <button class="format-btn" data-format="jpeg">JPG</button>
                    <button class="format-btn" data-format="png">PNG</button>
                    <button class="format-btn" data-format="webp">WebP</button>
                </div>
            </div>
            <button class="btn" id="compressBtn">🗜️ 开始压缩</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在压缩中，请稍候...</p>
        </div>

        <div class="preview-container" id="previewContainer">
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="originalSize">-</div>
                    <div class="stat-label">原文件大小</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="newSize">-</div>
                    <div class="stat-label">压缩后大小</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="compressRatio">-</div>
                    <div class="stat-label">压缩率</div>
                </div>
            </div>
            <div class="preview-row">
                <div class="preview-box">
                    <h3>📷 原图</h3>
                    <canvas id="originalCanvas"></canvas>
                </div>
                <div class="preview-box">
                    <h3>✨ 压缩后</h3>
                    <canvas id="resultCanvas"></canvas>
                </div>
            </div>
            <button class="btn" id="downloadBtn">💾 下载图片</button>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const options = document.getElementById('options');
        const loading = document.getElementById('loading');
        const previewContainer = document.getElementById('previewContainer');
        const originalCanvas = document.getElementById('originalCanvas');
        const resultCanvas = document.getElementById('resultCanvas');
        const downloadBtn = document.getElementById('downloadBtn');
        const qualitySlider = document.getElementById('qualitySlider');
        const qualityValue = document.getElementById('qualityValue');
        const qualityLabel = document.getElementById('qualityLabel');
        const formatBtns = document.querySelectorAll('.format-btn');

        let currentFile = null;
        let currentImage = null;
        let outputFormat = 'original';
        let quality = 80;

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) handleFile(file);
        });
        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        qualitySlider.addEventListener('input', e => {
            quality = parseInt(e.target.value);
            qualityValue.textContent = quality + '%';
            qualityLabel.textContent = quality + '%';
        });

        formatBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                formatBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                outputFormat = btn.dataset.format;
            });
        });

        function handleFile(file) {
            currentFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    uploadArea.style.display = 'none';
                    options.classList.add('show');
                    
                    const maxSize = 500;
                    let width = img.width;
                    let height = img.height;
                    if (width > maxSize || height > maxSize) {
                        if (width > height) {
                            height = (height / width) * maxSize;
                            width = maxSize;
                        } else {
                            width = (width / height) * maxSize;
                            height = maxSize;
                        }
                    }
                    
                    originalCanvas.width = width;
                    originalCanvas.height = height;
                    const ctx = originalCanvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    document.getElementById('originalSize').textContent = formatSize(file.size);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function compressImage() {
            if (!currentImage) return;
            loading.classList.add('show');
            previewContainer.classList.remove('show');

            setTimeout(() => {
                const format = outputFormat === 'original' ? currentFile.type : 'image/' + outputFormat;
                const mimeType = format.includes('jpeg') ? 'image/jpeg' : format;
                
                resultCanvas.width = originalCanvas.width;
                resultCanvas.height = originalCanvas.height;
                const ctx = resultCanvas.getContext('2d');
                ctx.drawImage(currentImage, 0, 0, originalCanvas.width, originalCanvas.height);
                
                const dataUrl = resultCanvas.toDataURL(mimeType, quality / 100);
                const newSize = Math.round((dataUrl.length - dataUrl.indexOf(',') - 1) * 0.75);
                
                const tempImg = new Image();
                tempImg.onload = () => {
                    resultCanvas.width = tempImg.width;
                    resultCanvas.height = tempImg.height;
                    const rctx = resultCanvas.getContext('2d');
                    rctx.drawImage(tempImg, 0, 0);
                    
                    const finalDataUrl = resultCanvas.toDataURL(mimeType, quality / 100);
                    const finalSize = Math.round((finalDataUrl.length - finalDataUrl.indexOf(',') - 1) * 0.75);
                    
                    document.getElementById('newSize').textContent = formatSize(finalSize);
                    document.getElementById('compressRatio').textContent = Math.round((1 - finalSize / currentFile.size) * 100) + '%';
                    
                    loading.classList.remove('show');
                    previewContainer.classList.add('show');
                    downloadBtn.dataset.mimeType = mimeType;
                    downloadBtn.dataset.filename = 'compressed_' + Date.now() + '.' + (outputFormat === 'original' ? currentFile.name.split('.').pop() : outputFormat);
                };
                tempImg.src = dataUrl;
            }, 100);
        }

        document.getElementById('compressBtn').addEventListener('click', compressImage);

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = downloadBtn.dataset.filename;
            link.href = resultCanvas.toDataURL(downloadBtn.dataset.mimeType, quality / 100);
            link.click();
        });

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }
    </script>
</body>
