    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const colorPicker = document.getElementById('colorPicker');
        const loading = document.getElementById('loading');
        const previewContainer = document.getElementById('previewContainer');
        const originalCanvas = document.getElementById('originalCanvas');
        const resultCanvas = document.getElementById('resultCanvas');
        const downloadBtn = document.getElementById('downloadBtn');
        const processBtn = document.getElementById('processBtn');
        const colorOptions = document.querySelectorAll('.color-option');

        let currentColor = '#4A90D9';
        let currentImageData = null;
        let originalImage = null;

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) handleFile(file);
        });
        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        colorOptions.forEach(option => {
            option.addEventListener('click', () => {
                colorOptions.forEach(o => o.classList.remove('selected'));
                option.classList.add('selected');
                currentColor = option.dataset.color;
                if (originalImage) processImage();
            });
        });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    uploadArea.style.display = 'none';
                    colorPicker.classList.add('show');
                    
                    const maxSize = 500;
                    let width = img.width;
                    let height = img.height;
                    if (width > maxSize || height > maxSize) {
                        if (width > height) { height = (height / width) * maxSize; width = maxSize; }
                        else { width = (width / height) * maxSize; height = maxSize; }
                    }
                    
                    originalCanvas.width = width;
                    originalCanvas.height = height;
                    const ctx = originalCanvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    currentImageData = ctx.getImageData(0, 0, width, height);
                    processImage();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function processImage() {
            loading.classList.add('show');
            previewContainer.classList.remove('show');
            
            setTimeout(() => {
                const width = originalCanvas.width;
                const height = originalCanvas.height;
                resultCanvas.width = width;
                resultCanvas.height = height;
                
                const srcCtx = originalCanvas.getContext('2d');
                const srcData = srcCtx.getImageData(0, 0, width, height);
                const resultCtx = resultCanvas.getContext('2d');
                const originalResult = resultCtx.createImageData(width, height);
                resultCtx.drawImage(originalCanvas, 0, 0);
                const resultData = resultCtx.getImageData(0, 0, width, height);
                
                for (let i = 0; i < srcData.data.length; i += 4) {
                    const r = srcData.data[i];
                    const g = srcData.data[i + 1];
                    const b = srcData.data[i + 2];
                    
                    const isSkin = isSkinColor(r, g, b);
                    const isLight = r > 200 && g > 200 && b > 200;
                    const isBackground = !isSkin && !isLight;
                    
                    if (isBackground) {
                        const color = hexToRgb(currentColor);
                        resultData.data[i] = color.r;
                        resultData.data[i + 1] = color.g;
                        resultData.data[i + 2] = color.b;
                    }
                }
                
                resultCtx.putImageData(resultData, 0, 0);
                loading.classList.remove('show');
                previewContainer.classList.add('show');
            }, 100);
        }

        function isSkinColor(r, g, b) {
            const rgRatio = r / (g + 1);
            const rbRatio = r / (b + 1);
            return (r > 95 && g > 40 && b > 20) && (Math.abs(r - g) > 15) && (r > g && r > b) && (rgRatio > 1.0 && rgRatio < 1.8) && (rbRatio > 1.2 && rbRatio < 2.5);
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : { r: 74, g: 144, b: 217 };
        }

        processBtn.addEventListener('click', processImage);

        downloadBtn.addEventListener('click', () => {
            showPaywall(() => {
                const link = document.createElement('a');
                link.download = '证件照_' + Date.now() + '.png';
                link.href = resultCanvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>

        document.getElementById('adContainer').classList.remove('show');

    function watchAd() {

        let seconds = 5;
        document.getElementById('adCountdown').textContent = seconds;
        adTimer = setInterval(() => {
            seconds--;
            document.getElementById('adCountdown').textContent = seconds;
            if (seconds <= 0) {

                adTimer = null;
                closePaywall();
                if (paywallCallback) paywallCallback();
            }
        }, 1000);
    }
